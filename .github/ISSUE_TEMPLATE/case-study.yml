name: Propose a case study
about: Propose a structured project case for the repository.
title: "[Case]: "
labels: [case-study, evidence-needed]
body:
  - type: input
    id: title
    attributes:
      label: Public case title
      placeholder: A title that reveals no confidential customer identity
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem and success criteria
    validations:
      required: true
  - type: textarea
    id: human_ai
    attributes:
      label: Human decisions and AI execution
      description: Separate what humans owned from what agents performed.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Available evidence
      description: Tests, metrics, logs, traces, screenshots, benchmarks, or sanitized artifacts.
    validations:
      required: true
  - type: textarea
    id: failure
    attributes:
      label: Failure, trade-off, or surprising result
    validations:
      required: true
  - type: checkboxes
    id: permissions
    attributes:
      label: Rights and safety
      options:
        - label: I have the right to publish this material under the repository license.
          required: true
        - label: Sensitive information has been removed or abstracted.
          required: true
